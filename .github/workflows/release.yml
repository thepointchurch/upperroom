name: Release

on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"

      - name: Install Dependencies
        run: |
          uv sync --locked --dev --extra aws --extra cache --extra pgsql

      - name: Set version
        id: version
        env:
          PYTHONPATH: .
        run: >
          uv run python -c
          'import os;
          import pathlib;
          from version import update_version;
          pathlib.Path(os.environ["GITHUB_OUTPUT"]).write_text(f"version={update_version()}")'

      - name: Run tests
        id: test
        env:
          DJANGO_SETTINGS_MODULE: upperroom.settings
          SECRET_KEY: secret
          DATABASE_URL: sqlite:///test.sqlite3
        run: |
          uv run pytest

      - name: Build Wheel
        run: |
          uv build --wheel

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload wheel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_name: upperroom-${{ steps.version.outputs.version }}-py3-none-any.whl
          asset_path: ./dist/upperroom-${{ steps.version.outputs.version }}-py3-none-any.whl
          asset_content_type: application/zip
